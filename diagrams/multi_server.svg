<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 440" width="760" height="440">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa"/>
    </marker>
    <marker id="arr2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
  </defs>

  <rect width="760" height="440" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="380" y="32" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="#f1f5f9">Multi-Server MCP Architecture</text>
  <text x="380" y="50" text-anchor="middle" font-family="monospace" font-size="11" fill="#64748b">One Claude connects to multiple specialized MCP servers</text>

  <!-- Claude box (center top) -->
  <rect x="290" y="75" width="180" height="70" rx="10" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="380" y="100" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#93c5fd">Claude AI</text>
  <text x="380" y="118" text-anchor="middle" font-family="monospace" font-size="10" fill="#60a5fa">+ MCP Client Layer</text>
  <text x="380" y="134" text-anchor="middle" font-family="monospace" font-size="18">🧠</text>

  <!-- Server boxes -->
  <!-- Weather Server -->
  <rect x="30" y="230" width="130" height="110" rx="10" fill="#14532d" stroke="#10b981" stroke-width="1.5"/>
  <text x="95" y="255" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#6ee7b7">Weather 🌤️</text>
  <text x="95" y="272" text-anchor="middle" font-family="monospace" font-size="9" fill="#4ade80">get_weather()</text>
  <text x="95" y="287" text-anchor="middle" font-family="monospace" font-size="9" fill="#4ade80">get_forecast()</text>
  <text x="95" y="302" text-anchor="middle" font-family="monospace" font-size="9" fill="#4ade80">compare_cities()</text>
  <text x="95" y="327" text-anchor="middle" font-family="monospace" font-size="9" fill="#166534">→ Weather API</text>

  <!-- GitHub Server -->
  <rect x="190" y="230" width="130" height="110" rx="10" fill="#312e81" stroke="#818cf8" stroke-width="1.5"/>
  <text x="255" y="255" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#c7d2fe">GitHub 🐙</text>
  <text x="255" y="272" text-anchor="middle" font-family="monospace" font-size="9" fill="#a5b4fc">read_file()</text>
  <text x="255" y="287" text-anchor="middle" font-family="monospace" font-size="9" fill="#a5b4fc">list_issues()</text>
  <text x="255" y="302" text-anchor="middle" font-family="monospace" font-size="9" fill="#a5b4fc">create_issue()</text>
  <text x="255" y="327" text-anchor="middle" font-family="monospace" font-size="9" fill="#4338ca">→ GitHub API</text>

  <!-- Files Server -->
  <rect x="350" y="230" width="130" height="110" rx="10" fill="#7c2d12" stroke="#f97316" stroke-width="1.5"/>
  <text x="415" y="255" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#fed7aa">Files 📁</text>
  <text x="415" y="272" text-anchor="middle" font-family="monospace" font-size="9" fill="#fdba74">read_file()</text>
  <text x="415" y="287" text-anchor="middle" font-family="monospace" font-size="9" fill="#fdba74">write_file()</text>
  <text x="415" y="302" text-anchor="middle" font-family="monospace" font-size="9" fill="#fdba74">search_files()</text>
  <text x="415" y="327" text-anchor="middle" font-family="monospace" font-size="9" fill="#9a3412">→ Local Files</text>

  <!-- Research Server -->
  <rect x="510" y="230" width="130" height="110" rx="10" fill="#4a1d96" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="575" y="255" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#ddd6fe">Research 🔬</text>
  <text x="575" y="272" text-anchor="middle" font-family="monospace" font-size="9" fill="#c4b5fd">search_wiki()</text>
  <text x="575" y="287" text-anchor="middle" font-family="monospace" font-size="9" fill="#c4b5fd">get_facts()</text>
  <text x="575" y="302" text-anchor="middle" font-family="monospace" font-size="9" fill="#c4b5fd">summarize()</text>
  <text x="575" y="327" text-anchor="middle" font-family="monospace" font-size="9" fill="#6d28d9">→ Wikipedia API</text>

  <!-- Database Server -->
  <rect x="670" y="230" width="70" height="110" rx="10" fill="#831843" stroke="#f472b6" stroke-width="1.5"/>
  <text x="705" y="255" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#fbcfe8">DB 🗄️</text>
  <text x="705" y="275" text-anchor="middle" font-family="monospace" font-size="8" fill="#f9a8d4">query()</text>
  <text x="705" y="290" text-anchor="middle" font-family="monospace" font-size="8" fill="#f9a8d4">insert()</text>
  <text x="705" y="305" text-anchor="middle" font-family="monospace" font-size="8" fill="#f9a8d4">schema()</text>
  <text x="705" y="327" text-anchor="middle" font-family="monospace" font-size="8" fill="#9d174d">→ SQLite</text>

  <!-- Lines from Claude to each server -->
  <line x1="320" y1="145" x2="95" y2="230" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="4,3"/>
  <line x1="350" y1="145" x2="255" y2="230" stroke="#818cf8" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="4,3"/>
  <line x1="380" y1="145" x2="415" y2="230" stroke="#f97316" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="4,3"/>
  <line x1="410" y1="145" x2="575" y2="230" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="4,3"/>
  <line x1="440" y1="145" x2="705" y2="230" stroke="#f472b6" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="4,3"/>

  <!-- Bottom caption -->
  <rect x="30" y="360" width="700" height="68" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="380" y="380" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#f1f5f9">Example conversation using multiple servers at once:</text>
  <text x="50" y="398" font-family="monospace" font-size="10" fill="#94a3b8">User:</text>
  <text x="90" y="398" font-family="monospace" font-size="10" fill="#60a5fa">"Research quantum computing, save a report, and open a GitHub issue"</text>
  <text x="50" y="416" font-family="monospace" font-size="10" fill="#94a3b8">Claude:</text>
  <text x="98" y="416" font-family="monospace" font-size="10" fill="#10b981">→ Research: search_wiki() → Files: write_file() → GitHub: create_issue() [all in one reply!]</text>
</svg>
