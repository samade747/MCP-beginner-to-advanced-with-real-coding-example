<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" width="700" height="380">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa"/>
    </marker>
  </defs>

  <rect width="700" height="380" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="350" y="32" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="#f1f5f9">Tool Call Flow</text>
  <text x="350" y="50" text-anchor="middle" font-family="monospace" font-size="11" fill="#64748b">What happens when Claude uses a tool</text>

  <!-- Step boxes -->
  <!-- Step 1 -->
  <rect x="30" y="80" width="140" height="70" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="100" y="104" text-anchor="middle" font-family="monospace" font-size="10" fill="#93c5fd">① USER</text>
  <text x="100" y="122" text-anchor="middle" font-family="monospace" font-size="9" fill="#7dd3fc">"What's the</text>
  <text x="100" y="137" text-anchor="middle" font-family="monospace" font-size="9" fill="#7dd3fc">weather in London?"</text>

  <!-- Arrow 1→2 -->
  <line x1="170" y1="115" x2="210" y2="115" stroke="#60a5fa" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2 -->
  <rect x="210" y="80" width="140" height="70" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="280" y="104" text-anchor="middle" font-family="monospace" font-size="10" fill="#93c5fd">② CLAUDE</text>
  <text x="280" y="122" text-anchor="middle" font-family="monospace" font-size="9" fill="#7dd3fc">Recognizes need</text>
  <text x="280" y="137" text-anchor="middle" font-family="monospace" font-size="9" fill="#7dd3fc">for weather tool</text>

  <!-- Arrow 2→3 -->
  <line x1="350" y1="115" x2="390" y2="115" stroke="#60a5fa" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3 -->
  <rect x="390" y="80" width="140" height="70" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="460" y="104" text-anchor="middle" font-family="monospace" font-size="10" fill="#93c5fd">③ MCP CLIENT</text>
  <text x="460" y="122" text-anchor="middle" font-family="monospace" font-size="9" fill="#7dd3fc">Sends JSON-RPC</text>
  <text x="460" y="137" text-anchor="middle" font-family="monospace" font-size="9" fill="#7dd3fc">tool call request</text>

  <!-- Arrow 3→4 -->
  <line x1="530" y1="115" x2="570" y2="115" stroke="#60a5fa" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 4 -->
  <rect x="570" y="80" width="100" height="70" rx="8" fill="#14532d" stroke="#10b981" stroke-width="1.5"/>
  <text x="620" y="104" text-anchor="middle" font-family="monospace" font-size="10" fill="#6ee7b7">④ SERVER</text>
  <text x="620" y="122" text-anchor="middle" font-family="monospace" font-size="9" fill="#34d399">Runs your</text>
  <text x="620" y="137" text-anchor="middle" font-family="monospace" font-size="9" fill="#34d399">Python fn</text>

  <!-- Curved arrow back from server to client -->
  <path d="M620 150 Q620 200 460 200 Q350 200 280 200 Q170 200 100 200 L100 220" stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="350" y="195" text-anchor="middle" font-family="monospace" font-size="9" fill="#34d399">result returned through the chain</text>

  <!-- Step 5 — User gets response -->
  <rect x="30" y="230" width="140" height="70" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="100" y="254" text-anchor="middle" font-family="monospace" font-size="10" fill="#93c5fd">⑤ RESPONSE</text>
  <text x="100" y="272" text-anchor="middle" font-family="monospace" font-size="9" fill="#7dd3fc">"London: 18°C</text>
  <text x="100" y="287" text-anchor="middle" font-family="monospace" font-size="9" fill="#7dd3fc">partly cloudy"</text>

  <!-- JSON example -->
  <rect x="30" y="320" width="640" height="48" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="50" y="338" font-family="monospace" font-size="10" fill="#94a3b8">Request: </text>
  <text x="110" y="338" font-family="monospace" font-size="10" fill="#60a5fa">{"method": "tools/call", "params": {"name": "get_weather", "arguments": {"city": "London"}}}</text>
  <text x="50" y="356" font-family="monospace" font-size="10" fill="#94a3b8">Response:</text>
  <text x="110" y="356" font-family="monospace" font-size="10" fill="#10b981">{"result": {"content": [{"type": "text", "text": "London: ⛅ 18°C, partly cloudy"}]}}</text>
</svg>
