<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa"/>
    </marker>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="monospace" font-size="18" font-weight="bold" fill="#f1f5f9">MCP Architecture</text>
  <text x="400" y="58" text-anchor="middle" font-family="monospace" font-size="11" fill="#64748b">How Claude connects to your tools via Model Context Protocol</text>

  <!-- HOST box -->
  <rect x="30" y="80" width="740" height="320" rx="12" fill="none" stroke="#334155" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="50" y="102" font-family="monospace" font-size="11" fill="#64748b">HOST APPLICATION (e.g. Claude Desktop)</text>

  <!-- AI Model -->
  <rect x="60" y="120" width="160" height="80" rx="10" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="140" y="148" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#93c5fd">AI Model</text>
  <text x="140" y="166" text-anchor="middle" font-family="monospace" font-size="11" fill="#60a5fa">Claude</text>
  <text x="140" y="184" text-anchor="middle" font-family="monospace" font-size="20">🧠</text>

  <!-- Arrow AI to Client -->
  <line x1="220" y1="160" x2="280" y2="160" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="250" y="150" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">request</text>

  <!-- MCP Client -->
  <rect x="280" y="120" width="160" height="80" rx="10" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="360" y="148" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#93c5fd">MCP Client</text>
  <text x="360" y="166" text-anchor="middle" font-family="monospace" font-size="10" fill="#60a5fa">JSON-RPC</text>
  <text x="360" y="184" text-anchor="middle" font-family="monospace" font-size="20">🔌</text>

  <!-- Arrow Client to Server -->
  <line x1="440" y1="160" x2="500" y2="160" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="470" y="150" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">JSON-RPC</text>

  <!-- MCP Server -->
  <rect x="500" y="120" width="230" height="80" rx="10" fill="#14532d" stroke="#10b981" stroke-width="1.5"/>
  <text x="615" y="148" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#6ee7b7">MCP Server</text>
  <text x="615" y="164" text-anchor="middle" font-family="monospace" font-size="10" fill="#34d399">Tools · Resources · Prompts</text>
  <text x="615" y="184" text-anchor="middle" font-family="monospace" font-size="20">⚙️</text>

  <!-- Three primitives -->
  <!-- Tools box -->
  <rect x="500" y="240" width="90" height="60" rx="8" fill="#166534" stroke="#16a34a" stroke-width="1"/>
  <text x="545" y="262" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#86efac">🛠️ Tools</text>
  <text x="545" y="278" text-anchor="middle" font-family="monospace" font-size="9" fill="#4ade80">Execute</text>
  <text x="545" y="291" text-anchor="middle" font-family="monospace" font-size="9" fill="#4ade80">Actions</text>

  <!-- Resources box -->
  <rect x="615" y="240" width="90" height="60" rx="8" fill="#166534" stroke="#16a34a" stroke-width="1"/>
  <text x="660" y="262" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#86efac">📊 Data</text>
  <text x="660" y="278" text-anchor="middle" font-family="monospace" font-size="9" fill="#4ade80">Read-only</text>
  <text x="660" y="291" text-anchor="middle" font-family="monospace" font-size="9" fill="#4ade80">Resources</text>

  <!-- Prompts box -->
  <rect x="500" y="320" width="205" height="60" rx="8" fill="#166534" stroke="#16a34a" stroke-width="1"/>
  <text x="602" y="342" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#86efac">💬 Prompts</text>
  <text x="602" y="358" text-anchor="middle" font-family="monospace" font-size="9" fill="#4ade80">Reusable Message Templates</text>
  <text x="602" y="371" text-anchor="middle" font-family="monospace" font-size="9" fill="#4ade80">for Common Tasks</text>

  <!-- Arrows from server to primitives -->
  <line x1="560" y1="200" x2="545" y2="240" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="615" y1="200" x2="660" y2="240" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="590" y1="200" x2="602" y2="320" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- User box below everything -->
  <rect x="60" y="240" width="160" height="60" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="140" y="265" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#cbd5e1">User</text>
  <text x="140" y="285" text-anchor="middle" font-family="monospace" font-size="22">👤</text>

  <!-- User to AI arrows -->
  <line x1="140" y1="240" x2="140" y2="200" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="155" y="225" font-family="monospace" font-size="9" fill="#64748b">asks</text>

  <!-- Legend -->
  <rect x="30" y="420" width="740" height="65" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="50" y="440" font-family="monospace" font-size="11" font-weight="bold" fill="#94a3b8">Transport Options:</text>
  <rect x="50" y="450" width="12" height="12" rx="2" fill="#3b82f6"/>
  <text x="68" y="461" font-family="monospace" font-size="10" fill="#60a5fa">stdio</text>
  <text x="100" y="461" font-family="monospace" font-size="10" fill="#64748b">— local subprocess (Claude Desktop, dev tools)</text>
  <rect x="50" y="466" width="12" height="12" rx="2" fill="#10b981"/>
  <text x="68" y="477" font-family="monospace" font-size="10" fill="#34d399">HTTP+SSE</text>
  <text x="130" y="477" font-family="monospace" font-size="10" fill="#64748b">— remote server (shared tools, cloud deployment)</text>
  <text x="500" y="461" font-family="monospace" font-size="10" fill="#64748b">Protocol: JSON-RPC 2.0</text>
  <text x="500" y="477" font-family="monospace" font-size="10" fill="#64748b">Security: User consent required for all operations</text>
</svg>
